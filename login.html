<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
    <div class="container">
        <h2 class="text-center mt-5"><span> Iniciar </span> <span class="sesion"> sesión</span>  </h2>
        <form id="loginForm" class="mt-4" action="login_verify.php" method="POST">
            <div class="mb-3">
                <label for="email" class="form-label borde-input">Correo electrónico</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Introduce tu correo electrónico" required />
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Introduce tu contraseña" required />
            </div>
            <button type="submit" class="btn btn-warning w-100" id="loginButton">Iniciar sesión</button>
        </form>

        <!-- Botón Administrador -->
        <div class="mb-3">
            <button class="btn btn-warning w-100" id="adminButton">Administrador</button>
        </div>

        <div class="text-center mt-3">
            <a href="formulario_registro.html">¿No tienes cuenta? Regístrate aquí</a>
        </div>
        
        <!-- Contenedor de la animación -->
        <div id="animationContainer" class="animation-container">
            <div id="loading" class="loading"></div>
            <div id="checkmark" class="checkmark">&#10003;</div> <!-- Checkmark -->
            <p id="successMessage">¡Bienvenido!</p>
        </div>
    </div>

    <script src="./js/logincargando.js"></script>

    
    <script>
        document.getElementById("adminButton").addEventListener("click", function() {
            // Redirigir a la página de administración
            window.location.href = "./hulul-admin/login.html"; // Cambia este enlace por el que desees
        });
    </script>
</body>
</html>
