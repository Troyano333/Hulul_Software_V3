<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HULUL - Usuarios Registrados</title>
    <link href="./css/usuarios.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet" />
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="sidebar-brand">
                <i class="fas fa-crown"></i> HULUL
            </a>
        </div>
        <ul class="sidebar-nav nav flex-column">
            <li class="nav-item">
                <a class="nav-link" href="index.html" onclick="showSection('dashboard')">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="reservas.html" onclick="showSection('reservas')">
                    <i class="fas fa-calendar-check"></i> Gestión de Reservas
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="palcos_mesas.html" onclick="showSection('inventario')">
                    <i class="fas fa-warehouse"></i> Palcos y Mesas
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="eventos.html" onclick="showSection('eventos')">
                    <i class="fas fa-star"></i> Eventos
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="usuarios.html" onclick="showSection('usuarios')">
                    <i class="fas fa-users"></i> Usuarios Registrados
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="reportes.html" onclick="showSection('reportes')">
                    <i class="fas fa-chart-line"></i> Reportes Financieros
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content p-4">
        <div id="usuarios" class="section active">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="chart-title">Usuarios Registrados</h2>
            </div>

            <!-- Tabla de Usuarios -->
            <div class="table-container">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Cédula</th>
                                <th>Teléfono</th>
                                <th>Dirección</th>
                                <th>Correo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usuariosTable">
                            <!-- Los usuarios se cargarán dinámicamente aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function cargarUsuarios() {
            try {
                const response = await fetch('php/usuarios.php');
                if (!response.ok) throw new Error('Error en la petición');
                const data = await response.json();

                const tableBody = document.getElementById('usuariosTable');
                tableBody.innerHTML = '';

                data.forEach(usuario => {
                    const fullName = usuario.nombre || '';
                    const parts = fullName.trim().split(' ');
                    const firstName = parts.shift() || '';
                    const lastName = parts.join(' ') || '';

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${usuario.id}</td>
                        <td>${firstName}</td>
                        <td>${lastName}</td>
                        <td>${usuario.cedula}</td>
                        <td>${usuario.celular}</td>
                        <td>${usuario.direccion}</td>
                        <td>${usuario.email}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="borrarUsuario(${usuario.id})">
                                <i class="fas fa-trash-alt"></i> Borrar
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error al cargar usuarios:', error);
            }
        }

        async function borrarUsuario(id) {
            if (!confirm('¿Estás seguro de eliminar este usuario?')) return;

            try {
                const response = await fetch('php/usuarios.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ action: 'delete', id: id })
                });
                if (!response.ok) throw new Error('Error en la petición');

                const data = await response.json();

                if (data.status === 'success') {
                    alert('Usuario eliminado exitosamente');
                    cargarUsuarios();
                } else {
                    alert('Error al eliminar usuario');
                }
            } catch (error) {
                console.error('Error al eliminar usuario:', error);
                alert('Hubo un problema con la eliminación del usuario');
            }
        }

        cargarUsuarios();
    </script>
</body>
</html>
