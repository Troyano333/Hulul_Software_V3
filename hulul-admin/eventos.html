<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HULUL - Gestión de Eventos</title>
    <link href="./css/eventos.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="sidebar-brand">
                <i class="fas fa-crown"></i>
                HULUL
            </a>
        </div>
        <ul class="sidebar-nav nav flex-column">
            <li class="nav-item">
                <a class="nav-link active" href="index.html" onclick="showSection('dashboard')">
                    <i class="fas fa-tachometer-alt"></i>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="reservas.html" onclick="showSection('reservas')">
                    <i class="fas fa-calendar-check"></i>
                    Gestión de Reservas
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="palcos_mesas.html" onclick="showSection('inventario')">
                    <i class="fas fa-warehouse"></i>
                    Palcos y Mesas
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="showSection('eventos')">
                    <i class="fas fa-star"></i>
                    Eventos 
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="usuarios.html" onclick="showSection('usuarios')">
                    <i class="fas fa-users"></i>
                    Usuarios Registrados
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="reportes.html" onclick="showSection('reportes')">
                    <i class="fas fa-chart-line"></i>
                    Reportes Financieros
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div id="eventos" class="section active">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="chart-title">Gestión de Eventos</h2>
            </div>

            <!-- Formulario para Agregar Evento -->
            <div class="row mb-4">
                <div class="col-lg-6">
                    <div class="form-container">
                        <h3 class="form-title">Agregar Evento</h3>
                        <form id="addEventoForm">
                            <div class="mb-3">
                                <label for="eventoNombre" class="form-label">Nombre del Evento</label>
                                <input type="text" class="form-control" id="eventoNombre" required>
                            </div>
                            <div class="mb-3">
                                <label for="eventoFecha" class="form-label">Fecha</label>
                                <input type="date" class="form-control" id="eventoFecha" required>
                            </div>
                            <div class="mb-3">
                                <label for="eventoHora" class="form-label">Hora</label>
                                <input type="time" class="form-control" id="eventoHora" required>
                            </div>
                            <div class="mb-3">
                                <label for="eventoImagen" class="form-label">Imagen del Evento</label>
                                <input type="file" class="form-control" id="eventoImagen" accept="image/*" required>
                            </div>
                            <div class="mb-3">
                                <label for="eventoDescripcion" class="form-label">Descripción del Evento</label>
                                <textarea class="form-control" id="eventoDescripcion" rows="3" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-success">Agregar Evento</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Eventos Disponibles -->
            <div class="section-title">
                <h3>Eventos Disponibles</h3>
            </div>
            <div class="row" id="eventosList">
                <!-- Aquí se agregarán dinámicamente los eventos -->
            </div>
        </div>
    </main>

    <!-- Bootstrap JS y dependencias -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="./js/eventos.js"></script>
</body>
</html>
