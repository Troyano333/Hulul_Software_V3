<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/contact.css">
    <title>Contacto</title>
</head>

<body>

    <div class="container">

        <section class="contact-section">
            <h2>Contáctanos</h2>
            <form class="contact-form">
                <input type="text" placeholder="Tu nombre" required>
                <input type="email" placeholder="Tu correo" required>
                <textarea placeholder="Tu mensaje" rows="5" required></textarea>
                <button type="submit">Enviar mensaje</button>
            </form>
        </section>

        <section class="redes_sociales">
            <div class="box-redes">
                <div class="img">
                    <img src="./img/twitter-2935414_640.png" alt="">
                    <a href="" class="title">X</a>
                </div>
                <div class="img">
                    <img src="./img/whatsapp-873316_640.png" alt="">
                     <a href="https://wa.me/573506025335" class="title">whatsapp</a>
                </div>
                <div class="img">
                    <img src="./img/youtube-2433301_640.png" alt="">
                     <a href="" class="title">youtube</a>
                </div>
                <div class="img">
                    <img src="./img/facebook-3000954_640.png" alt="">
                     <a href="" class="title">facebook</a>
                </div>
            </div>
        </section>

    </div>




</body>

</html>
